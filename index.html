    // Convert to grayscale float buffer
    var gray = new Float32Array(w * h);
    for (var i = 0; i < w * h; i++) {
        gray[i] = d[i * 4] * 0.299 + d[i * 4 + 1] * 0.587 + d[i * 4 + 2] * 0.114;
    }
    // Floyd-Steinberg error diffusion
    for (var y = 0; y < h; y++) {
        for (var x = 0; x < w; x++) {
            var idx = y * w + x;
            var old = gray[idx];
            var nw = old < 128 ? 0 : 255;
            gray[idx] = nw;
            var err = old - nw;
            if (x + 1 < w)               gray[idx + 1]     += err * 7 / 16;
            if (y + 1 < h && x > 0)      gray[idx + w - 1] += err * 3 / 16;
            if (y + 1 < h)               gray[idx + w]     += err * 5 / 16;
            if (y + 1 < h && x + 1 < w)  gray[idx + w + 1] += err * 1 / 16;
        }
    }
    // Write back
    for (var i = 0; i < w * h; i++) {
        var v = Math.max(0, Math.min(255, Math.round(gray[i])));
        d[i * 4] = v; d[i * 4 + 1] = v; d[i * 4 + 2] = v;
    }
    ctx.putImageData(imgData, 0, 0);
    return srcCanvas;
}

// Bayer 8x8 ordered dithering matrix (normalized 0-63)
var BAYER8 = [
     0, 32,  8, 40,  2, 34, 10, 42,
    48, 16, 56, 24, 50, 18, 58, 26,
    12, 44,  4, 36, 14, 46,  6, 38,
    60, 28, 52, 20, 62, 30, 54, 22,
     3, 35, 11, 43,  1, 33,  9, 41,
    51, 19, 59, 27, 49, 17, 57, 25,
    15, 47,  7, 39, 13, 45,  5, 37,
    63, 31, 55, 23, 61, 29, 53, 21
];

function applyBayer(srcCanvas) {
    var w = srcCanvas.width, h = srcCanvas.height;
    var ctx = srcCanvas.getContext('2d');
    var imgData = ctx.getImageData(0, 0, w, h);
    var d = imgData.data;
    for (var y = 0; y < h; y++) {
        for (var x = 0; x < w; x++) {
            var idx = (y * w + x) * 4;
            var gray = d[idx] * 0.299 + d[idx + 1] * 0.587 + d[idx + 2] * 0.114;
            // Threshold from Bayer matrix (scaled to 0-255)
            var threshold = (BAYER8[(y & 7) * 8 + (x & 7)] + 0.5) / 64 * 255;
            var v = gray > threshold ? 255 : 0;
            d[idx] = v; d[idx + 1] = v; d[idx + 2] = v;
        }
    }
    ctx.putImageData(imgData, 0, 0);
    return srcCanvas;
}

function applyGamma(canvas, gamma) {
    if (gamma === 1.0) return;
    var ctx = canvas.getContext('2d');
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var invGamma = 1.0 / gamma;
    // Build lookup table
    var lut = new Uint8Array(256);
    for (var i = 0; i < 256; i++) {
        lut[i] = Math.round(255 * Math.pow(i / 255, invGamma));
    }
    for (var i = 0; i < d.length; i += 4) {
        d[i] = lut[d[i]];
        d[i + 1] = lut[d[i + 1]];
        d[i + 2] = lut[d[i + 2]];
    }
    ctx.putImageData(imgData, 0, 0);
}

function getFilteredImage(img, filter, sx, sy, sw, sh, targetW, targetH) {
    var imgS = S.image;
    // Check cache - include all adjustment params in key
    var cacheKey = filter + '_' + sx + '_' + sy + '_' + sw + '_' + sh + '_' + targetW + '_' + targetH +
        '_b' + imgS.brightness + '_c' + imgS.contrast + '_g' + imgS.gamma + '_bl' + imgS.blur + '_r' + imgS.ditherRes;
    if (ditherCache && ditherCache.src === img.src && ditherCache.key === cacheKey) {
        return ditherCache.canvas;
    }

    // If no filter and no adjustments, skip
    var hasAdjust = imgS.brightness !== 0 || imgS.contrast !== 0 || imgS.gamma !== 1.0 || imgS.blur > 0;
    if (filter === 'none' && !hasAdjust) return null;

    // For dither/bayer, process at ditherRes% of target resolution for visible pixels
    var procW = targetW, procH = targetH;
    if (filter !== 'none') {
        var scale = imgS.ditherRes / 100;
        procW = Math.max(20, Math.round(targetW * scale));
        procH = Math.max(20, Math.round(targetH * scale));
    }

    // Draw cropped image to temp canvas
    var tmp = document.createElement('canvas');
    tmp.width = procW; tmp.height = procH;
    var tmpCtx = tmp.getContext('2d');

    // Apply brightness/contrast/blur via CSS filter
    var filters = [];
    if (imgS.brightness !== 0) filters.push('brightness(' + (100 + imgS.brightness) + '%)');
    if (imgS.contrast !== 0) filters.push('contrast(' + (100 + imgS.contrast) + '%)');
    if (imgS.blur > 0) filters.push('blur(' + imgS.blur + 'px)');
    if (filters.length) tmpCtx.filter = filters.join(' ');
    tmpCtx.drawImage(img, sx, sy, sw, sh, 0, 0, procW, procH);
    tmpCtx.filter = 'none';

    // Apply gamma (pixel-level, after CSS filters)
    if (imgS.gamma !== 1.0) applyGamma(tmp, imgS.gamma);

    var result;
    if (filter === 'dither') {
        result = applyFloydSteinberg(tmp);
    } else if (filter === 'bayer') {
        result = applyBayer(tmp);
    } else {
        // Just adjustments, no dither
        result = tmp;
    }

    ditherCache = { src: img.src, key: cacheKey, canvas: result };
    return result;
}

function drawImageLayer(targetCtx, logicalW, logicalH, marginPx) {
    if (!loadedImage) return;
    var img = loadedImage;
    var imgS = S.image;

    // Source crop (percentages of original image)
    var sx = Math.round(img.naturalWidth * imgS.cropLeft / 100);
    var sy = Math.round(img.naturalHeight * imgS.cropTop / 100);
    var sw = Math.round(img.naturalWidth * (100 - imgS.cropLeft - imgS.cropRight) / 100);
    var sh = Math.round(img.naturalHeight * (100 - imgS.cropTop - imgS.cropBottom) / 100);
    if (sw <= 0 || sh <= 0) return;

    // Destination area depends on align mode
    var dx, dy, dw, dh;
    if (imgS.align === 'grid') {
        dx = marginPx;
        dw = logicalW - marginPx * 2;
    } else {
        dx = 0;
        dw = logicalW;
    }

    // Scale image to fill destination width, preserving aspect ratio
    var srcAspect = sw / sh;
    var drawW = dw;
    var drawH = drawW / srcAspect;

    // Vertical position
    var areaTop = (imgS.align === 'grid') ? marginPx : 0;
    var areaH = (imgS.align === 'grid') ? (logicalH - marginPx * 2) : logicalH;

    if (imgS.position === 'top') {
        dy = areaTop;
    } else if (imgS.position === 'center') {
        dy = areaTop + (areaH - drawH) / 2;
    } else {
        dy = areaTop + areaH - drawH;
    }

    // Apply offset (percentage of canvas dimensions)
    dx += logicalW * imgS.offsetX / 100;
    dy += logicalH * imgS.offsetY / 100;

    // Draw with opacity
    var prevAlpha = targetCtx.globalAlpha;
    targetCtx.globalAlpha = imgS.opacity;

    // Apply filter if needed
    var filtered = getFilteredImage(img, imgS.filter, sx, sy, sw, sh, Math.round(drawW), Math.round(drawH));
    if (filtered) {
        // Pixelated rendering for low-res dithering
        targetCtx.imageSmoothingEnabled = (imgS.filter === 'none');
        targetCtx.drawImage(filtered, 0, 0, filtered.width, filtered.height, dx, dy, drawW, drawH);
        targetCtx.imageSmoothingEnabled = true;
    } else {
        targetCtx.drawImage(img, sx, sy, sw, sh, dx, dy, drawW, drawH);
    }

    targetCtx.globalAlpha = prevAlpha;
}

function renderToContext(targetCtx, grid, cols, rows, fontSize, leading, headingsArr) {
    var font = getFont();
    targetCtx.font = fontSize + 'px ' + font;
    var charW = targetCtx.measureText('M').width;
    var charH = leading;
    var marginPx = S.margin * (fontSize / 10);

    var gridW = Math.ceil(cols * charW);
    var gridH = rows * charH;
    var logicalW = gridW + marginPx * 2;
    var logicalH = gridH + marginPx * 2;
    var yOff = (charH - fontSize) * 0.35;

    // Layer 1: Background (fills entire canvas incl margin)
    targetCtx.fillStyle = S.bgColor;
    targetCtx.fillRect(0, 0, logicalW, logicalH);

    // Layer 2: Image (between background and text, normal compositing)
    targetCtx.globalCompositeOperation = 'source-over';
    drawImageLayer(targetCtx, logicalW, logicalH, marginPx);

    // Layer 3: Foreground (Type) with blend mode, offset by margin
    targetCtx.globalCompositeOperation = S.blendMode;
    targetCtx.fillStyle = S.fgColor;
    targetCtx.font = fontSize + 'px ' + font;
    targetCtx.textBaseline = 'top';

    var ox = marginPx, oy = marginPx;

    // Draw grid characters
    for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
            var ch = grid[r][c];
            if (ch !== ' ') {
                targetCtx.fillText(ch, ox + c * charW, oy + r * charH + yOff);
            }
        }
    }

    // Heading overlay at scaled size with optional different font weight
    if (S.headingScale > 1 && headingsArr && headingsArr.length) {
        var hFontSize = fontSize * S.headingScale;
        var hFontStr = getHeadingFont().replace('{SIZE}', hFontSize);
        targetCtx.font = hFontStr;
        var isProportional = S.headingFont.indexOf('display-') === 0;
        var hCharW = targetCtx.measureText('M').width;

        for (var hi = 0; hi < headingsArr.length; hi++) {
            var h = headingsArr[hi];
            var startX = ox + h.c * charW;
            var startY = oy + h.r * charH + yOff;
            if (isProportional) {
                // Proportional font: render whole string at once for proper kerning
                targetCtx.fillText(h.text, startX, startY);
            } else {
                // Monospace: render char by char at grid positions
                for (var i = 0; i < h.text.length; i++) {
                    targetCtx.fillText(h.text[i], startX + i * hCharW, startY);
                }
            }
        }
    }

    targetCtx.globalCompositeOperation = 'source-over';

    return { logicalW: logicalW, logicalH: logicalH, charW: charW, charH: charH };
}

function buildBaseGrid() {
    var cols = S.cols;
    var rows = computeRows(cols, S.aspectRatio);
    currentCols = cols;
    currentRows = rows;

    headings = [];
    var grid = createGrid(cols, rows);
    var preset = PRESETS[S.preset];
    if (preset) preset.build(grid, cols, rows, S.content);
    baseGrid = grid;
    return { grid: grid, headings: headings.slice() };
}

function render(frameOverride) {
    var baseResult = buildBaseGrid();
    var savedHeadings = baseResult.headings;

    var cols = currentCols;
    var rows = currentRows;
    var frame = frameOverride !== undefined ? frameOverride : S.anim.frame;
    var total = totalFrames();

    // Apply animation effect
    var animFn = ANIMS[S.anim.effect];
    var grid;
    if (animFn && S.anim.effect !== 'none') {
        grid = animFn.apply(baseGrid, frame, total, cols, rows, S.anim.intensity);
    } else {
        grid = cloneGrid(baseGrid);
    }
    currentGrid = grid;

    // Measure for canvas sizing
    var font = getFont();
    var fontSize = S.fontSize;
    var leading = S.leading;
    var marginPx = S.margin * (fontSize / 10);
    ctx.font = fontSize + 'px ' + font;
    var charW = ctx.measureText('M').width;
    var charH = leading;

    var logicalW = Math.ceil(cols * charW) + marginPx * 2;
    var logicalH = rows * charH + marginPx * 2;
    var dpr = window.devicePixelRatio || 1;

    canvas.width = logicalW * dpr;
    canvas.height = logicalH * dpr;

    // Fit to viewport
    var container = document.getElementById('canvasContainer');
    var maxW = container.clientWidth - 40;
    var maxH = container.clientHeight - 40;
    var scale = Math.min(maxW / logicalW, maxH / logicalH, 1);
    canvas.style.width = Math.round(logicalW * scale) + 'px';
    canvas.style.height = Math.round(logicalH * scale) + 'px';

    // Render at DPR scale
    ctx.scale(dpr, dpr);
    var dims = renderToContext(ctx, grid, cols, rows, fontSize, leading, savedHeadings);

    // Update status
    document.getElementById('statusDims').textContent = cols + ' x ' + rows;
    document.getElementById('statusPreset').textContent = (PRESETS[S.preset] || {}).name || '\u2014';
    document.getElementById('statusAnim').textContent = S.anim.effect;
    document.getElementById('statusFrame').textContent = frame + '/' + total;
    document.getElementById('statusOutput').textContent = dims.logicalW + 'x' + dims.logicalH + ' px';
    document.getElementById('infoDims').textContent = cols + ' x ' + rows;
    document.getElementById('infoOutput').textContent = dims.logicalW + ' x ' + dims.logicalH + ' px';
    document.getElementById('frameVal').textContent = frame + ' / ' + total;

    return dims;
}

var renderTimer = null;
function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(function() { render(); }, 50);
}

// === ANIMATION LOOP ===================================================

var animFrameId = null;
var animStartTime = 0;

function animationLoop(timestamp) {
    if (!S.anim.playing) return;

    var elapsed = (timestamp - animStartTime) / 1000;
    var total = totalFrames();
    var fps = S.anim.fps;
    var targetFrame = Math.floor(elapsed * fps);

    if (S.anim.loop) {
        targetFrame = targetFrame % total;
    } else {
        if (targetFrame >= total) {
            targetFrame = total - 1;
            stopAnimation();
            return;
        }
    }

    if (targetFrame !== S.anim.frame) {
        S.anim.frame = targetFrame;
        document.getElementById('frameScrub').value = targetFrame;
        render(targetFrame);
    }

    animFrameId = requestAnimationFrame(animationLoop);
}

function playAnimation() {
    if (S.anim.playing) return;
    S.anim.playing = true;
    var total = totalFrames();
    // If at end, restart
    if (S.anim.frame >= total - 1) S.anim.frame = 0;
    animStartTime = performance.now() - (S.anim.frame / S.anim.fps) * 1000;
    document.getElementById('btnPlay').classList.add('playing');
    document.getElementById('btnPlay').innerHTML = '&#10074;&#10074;';
    animFrameId = requestAnimationFrame(animationLoop);
}

function pauseAnimation() {
    S.anim.playing = false;
    if (animFrameId) cancelAnimationFrame(animFrameId);
    animFrameId = null;
    document.getElementById('btnPlay').classList.remove('playing');
    document.getElementById('btnPlay').innerHTML = '&#9654;';
}

function stopAnimation() {
    pauseAnimation();
    S.anim.frame = 0;
    document.getElementById('frameScrub').value = 0;
    render(0);
}

function togglePlay() {
    if (S.anim.playing) pauseAnimation();
    else playAnimation();
}

// === EXPORT ===========================================================

function exportPNG() {
    var scale = S.exportScale;
    var cols = currentCols;
    var rows = currentRows;

    headings = [];
    var grid = createGrid(cols, rows);
    var preset = PRESETS[S.preset];
    if (preset) preset.build(grid, cols, rows, S.content);
    var savedHeadings = headings.slice();

    // Apply animation
    var animFn = ANIMS[S.anim.effect];
    if (animFn && S.anim.effect !== 'none') {
        grid = animFn.apply(grid, S.anim.frame, totalFrames(), cols, rows, S.anim.intensity);
    }

    var tmpCanvas = document.createElement('canvas');
    var tmpCtx = tmpCanvas.getContext('2d');
    var fontSize = S.fontSize * scale;
    var leading = S.leading * scale;
    var marginPx = S.margin * (fontSize / 10);

    tmpCtx.font = fontSize + 'px ' + getFont();
    var charW = tmpCtx.measureText('M').width;
    tmpCanvas.width = Math.ceil(cols * charW) + marginPx * 2;
    tmpCanvas.height = rows * leading + marginPx * 2;

    renderToContext(tmpCtx, grid, cols, rows, fontSize, leading, savedHeadings);

    tmpCanvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'poster_' + S.preset + '_' + S.anim.effect + '_f' + S.anim.frame + '_' + scale + 'x.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
}

function copyText() {
    if (!currentGrid) return;
    var lines = currentGrid.map(function(row) { return row.join(''); });
    var text = lines.map(function(l) { return l.replace(/\s+$/, ''); }).join('\n');
    navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('exportTxt');
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy Text'; }, 1500);
    });
}

function renderExportFrame(frameNum) {
    var scale = S.exportScale;
    var cols = currentCols;
    var rows = currentRows;

    headings = [];
    var grid = createGrid(cols, rows);
    var preset = PRESETS[S.preset];
    if (preset) preset.build(grid, cols, rows, S.content);
    var savedHeadings = headings.slice();

    var animFn = ANIMS[S.anim.effect];
    if (animFn && S.anim.effect !== 'none') {
        grid = animFn.apply(grid, frameNum, totalFrames(), cols, rows, S.anim.intensity);
    }

    var tmpCanvas = document.createElement('canvas');
    var tmpCtx = tmpCanvas.getContext('2d');
    var fontSize = S.fontSize * scale;
    var leading = S.leading * scale;
    var marginPx = S.margin * (fontSize / 10);

    tmpCtx.font = fontSize + 'px ' + getFont();
    var charW = tmpCtx.measureText('M').width;
    tmpCanvas.width = Math.ceil(cols * charW) + marginPx * 2;
    tmpCanvas.height = rows * leading + marginPx * 2;

    renderToContext(tmpCtx, grid, cols, rows, fontSize, leading, savedHeadings);
    return tmpCanvas;
}

function showProgress(pct) {
    var el = document.getElementById('exportProgress');
    var bar = document.getElementById('exportProgressBar');
    if (pct < 0) { el.classList.add('hidden'); return; }
    el.classList.remove('hidden');
    bar.style.width = pct + '%';
}

async function exportWebM() {
    var total = totalFrames();
    var fps = S.anim.fps;
    var btn = document.getElementById('exportWebm');
    btn.textContent = 'Recording...';
    showProgress(0);

    // Render first frame to get dimensions
    var firstCanvas = renderExportFrame(0);
    var w = firstCanvas.width;
    var h = firstCanvas.height;

    // Create recording canvas
    var recCanvas = document.createElement('canvas');
    recCanvas.width = w;
    recCanvas.height = h;
    var recCtx = recCanvas.getContext('2d');

    var stream = recCanvas.captureStream(0); // manual frame control
    var mimeType = 'video/webm;codecs=vp9';
    if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'video/webm;codecs=vp8';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'video/webm';
        }
    }
    var recorder = new MediaRecorder(stream, { mimeType: mimeType, videoBitsPerSecond: 8000000 });
    var chunks = [];
    recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };

    var done = new Promise(function(resolve) { recorder.onstop = resolve; });
    recorder.start();

    var videoTrack = stream.getVideoTracks()[0];

    for (var f = 0; f < total; f++) {
        var frameCanvas = renderExportFrame(f);
        recCtx.clearRect(0, 0, w, h);
        recCtx.drawImage(frameCanvas, 0, 0);
        if (videoTrack.requestFrame) videoTrack.requestFrame();
        showProgress(Math.round((f / total) * 100));
        // Wait for frame interval
        await new Promise(function(r) { setTimeout(r, 1000 / fps); });
    }

    recorder.stop();
    await done;

    var blob = new Blob(chunks, { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'poster_' + S.preset + '_' + S.anim.effect + '_' + total + 'f.webm';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    btn.textContent = 'WebM Video';
    showProgress(-1);
}

async function exportSequence(format) {
    var total = totalFrames();
    var btn = format === 'png' ? document.getElementById('exportPngSeq') : document.getElementById('exportJpgSeq');
    var origText = btn.textContent;
    btn.textContent = 'Rendering...';
    showProgress(0);

    // Collect blobs
    var blobs = [];
    for (var f = 0; f < total; f++) {
        var frameCanvas = renderExportFrame(f);
        var blob = await new Promise(function(resolve) {
            if (format === 'png') frameCanvas.toBlob(resolve, 'image/png');
            else frameCanvas.toBlob(resolve, 'image/jpeg', 0.92);
        });
        blobs.push(blob);
        showProgress(Math.round((f / total) * 100));
    }

    // Download as zip-like sequence (individual files via click)
    // For simplicity, download each frame
    btn.textContent = 'Downloading...';
    for (var i = 0; i < blobs.length; i++) {
        var url = URL.createObjectURL(blobs[i]);
        var a = document.createElement('a');
        a.href = url;
        var pad = String(i).padStart(4, '0');
        a.download = 'poster_' + S.preset + '_' + S.anim.effect + '_' + pad + '.' + format;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        // Small delay to avoid browser blocking
        await new Promise(function(r) { setTimeout(r, 50); });
    }

    btn.textContent = origText;
    showProgress(-1);
}

// === UI BINDINGS ======================================================

function updateFrameScrub() {
    var total = totalFrames();
    var scrub = document.getElementById('frameScrub');
    scrub.max = Math.max(0, total - 1);
    if (S.anim.frame >= total) S.anim.frame = total - 1;
    scrub.value = S.anim.frame;
    document.getElementById('totalFramesInfo').textContent = total;
    document.getElementById('frameVal').textContent = S.anim.frame + ' / ' + total;
}

function bindControls() {
    // Aspect ratio presets
    document.querySelectorAll('.aspect-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.aspect-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            var parts = btn.dataset.ratio.split(':').map(Number);
            S.aspectRatio = parts;
            scheduleRender();
        });
    });

    // Layout presets
    document.querySelectorAll('.preset-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.preset = btn.dataset.preset;
            scheduleRender();
        });
    });

    // Heading scale
    document.querySelectorAll('.heading-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.heading-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.headingScale = Number(btn.dataset.scale);
            scheduleRender();
        });
    });

    // Heading font
    document.getElementById('headingFont').addEventListener('change', function(e) {
        S.headingFont = e.target.value;
        scheduleRender();
    });

    // Animation presets
    document.querySelectorAll('.anim-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.anim-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.anim.effect = btn.dataset.anim;
            scheduleRender();
        });
    });

    // Scale presets
    document.querySelectorAll('.res-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.res-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.exportScale = Number(btn.dataset.scale);
        });
    });

    // Format sliders
    function bindSlider(id, setter, valId, fmt) {
        var el = document.getElementById(id);
        el.addEventListener('input', function() {
            var v = parseFloat(el.value);
            setter(v);
            if (valId) {
                var display = fmt ? fmt(v) : (Number.isInteger(v) ? v : v.toFixed(2));
                document.getElementById(valId).textContent = display;
            }
            scheduleRender();
        });
    }

    bindSlider('cols', function(v) { S.cols = v; }, 'colsVal');
    bindSlider('fontSize', function(v) {
        S.fontSize = v;
        S.leading = Math.round(v * 1.2);
    }, 'fontSizeVal');
    bindSlider('margin', function(v) { S.margin = v; }, 'marginVal');

    // Layer colors
    document.getElementById('bgColor').addEventListener('input', function(e) { S.bgColor = e.target.value; scheduleRender(); });
    document.getElementById('fgColor').addEventListener('input', function(e) { S.fgColor = e.target.value; scheduleRender(); });
    document.getElementById('blendMode').addEventListener('change', function(e) { S.blendMode = e.target.value; scheduleRender(); });

    // Style selects
    document.getElementById('fillChar').addEventListener('change', function(e) { S.fillChar = e.target.value; scheduleRender(); });
    document.getElementById('wallStyle').addEventListener('change', function(e) { S.wallStyle = e.target.value; scheduleRender(); });

    // Image import
    document.getElementById('imageInput').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
                loadedImage = img;
                document.getElementById('imageStatus').textContent = img.naturalWidth + 'x' + img.naturalHeight;
                document.getElementById('imageControls').classList.remove('hidden');
                document.getElementById('imageRemove').disabled = false;
                document.getElementById('imageSection').open = true;
                scheduleRender();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('imageRemove').addEventListener('click', function() {
        loadedImage = null;
        document.getElementById('imageInput').value = '';
        document.getElementById('imageStatus').textContent = 'No image';
        document.getElementById('imageControls').classList.add('hidden');
        document.getElementById('imageRemove').disabled = true;
        scheduleRender();
    });

    // Image position presets
    document.querySelectorAll('.img-pos-preset[data-pos]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.img-pos-preset[data-pos]').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.image.position = btn.dataset.pos;
            scheduleRender();
        });
    });

    // Image align presets
    document.querySelectorAll('.img-pos-preset[data-align]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.img-pos-preset[data-align]').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.image.align = btn.dataset.align;
            scheduleRender();
        });
    });

    // Image crop sliders
    bindSlider('imgCropTop', function(v) { S.image.cropTop = v; ditherCache = null; }, 'imgCropTopVal');
    bindSlider('imgCropBottom', function(v) { S.image.cropBottom = v; ditherCache = null; }, 'imgCropBottomVal');
    bindSlider('imgCropLeft', function(v) { S.image.cropLeft = v; ditherCache = null; }, 'imgCropLeftVal');
    bindSlider('imgCropRight', function(v) { S.image.cropRight = v; ditherCache = null; }, 'imgCropRightVal');
    bindSlider('imgOffsetX', function(v) { S.image.offsetX = v; }, 'imgOffsetXVal');
    bindSlider('imgOffsetY', function(v) { S.image.offsetY = v; }, 'imgOffsetYVal');
    bindSlider('imgOpacity', function(v) { S.image.opacity = v; }, 'imgOpacityVal');
    bindSlider('imgBrightness', function(v) { S.image.brightness = v; ditherCache = null; }, 'imgBrightnessVal');
    bindSlider('imgContrast', function(v) { S.image.contrast = v; ditherCache = null; }, 'imgContrastVal');
    bindSlider('imgGamma', function(v) { S.image.gamma = v; ditherCache = null; }, 'imgGammaVal');
    bindSlider('imgBlur', function(v) { S.image.blur = v; ditherCache = null; }, 'imgBlurVal');

    // Image filter presets
    document.querySelectorAll('.img-pos-preset[data-filter]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.img-pos-preset[data-filter]').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.image.filter = btn.dataset.filter;
            ditherCache = null; // invalidate cache
            scheduleRender();
        });
    });

    // Dither resolution
    bindSlider('imgDitherRes', function(v) { S.image.ditherRes = v; ditherCache = null; }, 'imgDitherResVal');

    // Content fields
    var contentFields = {
        cGallery: 'gallery', cArtist: 'artist', cTitle: 'title', cTagline: 'tagline',
        cDate: 'date', cTime: 'time', cLocation: 'location', cAdmission: 'admission',
        cUrl: 'url', cTags: 'tags', cExtra: 'extra',
    };
    for (var id in contentFields) {
        (function(fieldId, key) {
            var el = document.getElementById(fieldId);
            el.addEventListener('input', function() { S.content[key] = el.value; scheduleRender(); });
        })(id, contentFields[id]);
    }

    // Extended fields toggle
    document.getElementById('showExtended').addEventListener('change', function(e) {
        S.content.showExtended = e.target.checked;
        document.getElementById('extendedFields').classList.toggle('hidden', !e.target.checked);
        scheduleRender();
    });

    // Animation controls
    document.getElementById('btnPlay').addEventListener('click', togglePlay);
    document.getElementById('btnStop').addEventListener('click', stopAnimation);
    document.getElementById('btnPrevFrame').addEventListener('click', function() {
        pauseAnimation();
        S.anim.frame = Math.max(0, S.anim.frame - 1);
        document.getElementById('frameScrub').value = S.anim.frame;
        render(S.anim.frame);
    });
    document.getElementById('btnNextFrame').addEventListener('click', function() {
        pauseAnimation();
        S.anim.frame = Math.min(totalFrames() - 1, S.anim.frame + 1);
        document.getElementById('frameScrub').value = S.anim.frame;
        render(S.anim.frame);
    });

    // Frame scrubber
    document.getElementById('frameScrub').addEventListener('input', function(e) {
        pauseAnimation();
        S.anim.frame = parseInt(e.target.value);
        render(S.anim.frame);
    });

    // Duration
    bindSlider('duration', function(v) {
        S.anim.duration = v;
        updateFrameScrub();
    }, 'durationVal', function(v) { return v.toFixed(1); });

    // FPS
    bindSlider('fps', function(v) {
        S.anim.fps = v;
        updateFrameScrub();
    }, 'fpsVal');

    // Intensity
    bindSlider('intensity', function(v) { S.anim.intensity = v; }, 'intensityVal');

    // Loop
    document.getElementById('animLoop').addEventListener('change', function(e) { S.anim.loop = e.target.checked; });

    // Export
    document.getElementById('exportPng').addEventListener('click', exportPNG);
    document.getElementById('exportTxt').addEventListener('click', copyText);
    document.getElementById('exportWebm').addEventListener('click', exportWebM);
    document.getElementById('exportPngSeq').addEventListener('click', function() { exportSequence('png'); });
    document.getElementById('exportJpgSeq').addEventListener('click', function() { exportSequence('jpg'); });

    // Resize
    window.addEventListener('resize', scheduleRender);

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowLeft') { e.preventDefault(); pauseAnimation(); S.anim.frame = Math.max(0, S.anim.frame - 1); document.getElementById('frameScrub').value = S.anim.frame; render(S.anim.frame); }
        if (e.code === 'ArrowRight') { e.preventDefault(); pauseAnimation(); S.anim.frame = Math.min(totalFrames() - 1, S.anim.frame + 1); document.getElementById('frameScrub').value = S.anim.frame; render(S.anim.frame); }
        if (e.code === 'Home') { e.preventDefault(); stopAnimation(); }
    });
}

// === INIT =============================================================

bindControls();
updateFrameScrub();
render();

</script>
</body>
</html>

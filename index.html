// === ANIMATION EFFECTS ================================================

const GLYPHS = '\u2588\u2593\u2592\u2591\u2580\u2584\u258C\u2590\u2596\u2597\u2598\u2599\u259A\u259B\u259C\u259D\u259E\u259F\u2502\u2500\u250C\u2510\u2514\u2518\u253C\u2524\u251C\u252C\u2534\u2550\u2551\u2554\u2557\u255A\u255D'.split('');
var FILL_CHARS = '\u2588\u2593\u2592\u2591';
var WALL_CHARS = '\u2500\u2502\u250C\u2510\u2514\u2518\u251C\u2524\u252C\u2534\u253C\u258F\u2550\u2551\u2554\u2557\u255A\u255D\u2560\u2563\u2566\u2569\u256C\u2501\u2503\u250F\u2513\u2517\u251B\u2523\u252B\u2533\u253B\u254B';

function isWall(ch) { return WALL_CHARS.indexOf(ch) >= 0; }
function isFill(ch) { return FILL_CHARS.indexOf(ch) >= 0; }
function isStructural(ch) { return isWall(ch) || isFill(ch); }

const ANIMS = {

'none': {
    name: 'None',
    apply(base, frame, total, cols, rows, intensity) { return cloneGrid(base); }
},

// Typewriter: variable speed segments, holds at end for ~15% of duration
'typewriter': {
    name: 'Typewriter',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        var cells = [];
        for (var r = 0; r < rows; r++)
            for (var c = 0; c < cols; c++)
                if (base[r][c] !== ' ') cells.push({ r: r, c: c, ch: base[r][c] });
        if (cells.length === 0) return out;

        var t = frame / Math.max(1, total - 1);
        // Reserve last 15% to show complete layout
        var typeDuration = 0.85;
        var typeT = Math.min(1, t / typeDuration);

        var segments = 8;
        var segLen = cells.length / segments;
        var revealed = 0;
        for (var seg = 0; seg < segments; seg++) {
            var segStart = seg / segments;
            var isSlow = seg % 3 === 1;
            var segDuration = isSlow ? 0.2 : 0.08;
            var segProgress;
            if (typeT < segStart) segProgress = 0;
            else if (typeT >= segStart + segDuration) segProgress = 1;
            else segProgress = (typeT - segStart) / segDuration;
            segProgress = Math.min(1, Math.max(0, segProgress));
            segProgress = segProgress * segProgress * (3 - 2 * segProgress);
            revealed += Math.round(segLen * segProgress);
        }
        revealed = Math.min(cells.length, Math.round(revealed * (0.5 + intensity * 0.5)));
        if (t >= typeDuration) revealed = cells.length;

        for (var i = 0; i < revealed; i++)
            set(out, cells[i].r, cells[i].c, cells[i].ch);
        if (revealed < cells.length && frame % 4 < 2) {
            var cur = cells[Math.min(revealed, cells.length - 1)];
            set(out, cur.r, cur.c, '\u2588');
        }
        return out;
    }
},

// Rain: falling blocks through the layout
'rain': {
    name: 'Rain',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var rng = mulberry32(42);
        var numDrops = Math.round(cols * 0.3 * (0.3 + intensity * 0.7));
        var drops = [];
        for (var d = 0; d < numDrops; d++) {
            drops.push({
                col: Math.floor(rng() * cols),
                speed: 0.5 + rng() * 2,
                offset: rng() * rows * 2,
                len: 3 + Math.floor(rng() * 8),
                ch: ['\u2591', '\u2592', '\u2593', '\u2588'][Math.floor(rng() * 4)],
            });
        }
        for (var d = 0; d < drops.length; d++) {
            var drop = drops[d];
            var headRow = (drop.offset + frame * drop.speed) % (rows + drop.len + 10) - drop.len;
            for (var i = 0; i < drop.len; i++) {
                var r = Math.floor(headRow - i);
                if (r >= 0 && r < rows) {
                    var fade = 1 - i / drop.len;
                    if (rng() < fade * 0.8)
                        set(out, r, drop.col, i === 0 ? '\u2588' : drop.ch);
                }
            }
        }
        return out;
    }
},

// Glitch: slower, held for multiple frames, less frantic
'glitch': {
    name: 'Glitch',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        // Change glitch pattern every 4 frames for steadier look
        var glitchSeed = Math.floor(frame / 4) * 7 + 13;
        var rng = mulberry32(glitchSeed);
        // Fewer, larger blocks
        var numBlocks = 1 + Math.floor(rng() * 3 * intensity);
        for (var b = 0; b < numBlocks; b++) {
            var bw = 4 + Math.floor(rng() * 12);
            var bh = 1 + Math.floor(rng() * 2);
            var br = Math.floor(rng() * rows);
            var bc = Math.floor(rng() * cols);
            // Horizontal shift: copy from offset position
            var shiftC = Math.floor((rng() - 0.5) * 20);
            for (var r = 0; r < bh; r++) {
                for (var c = 0; c < bw; c++) {
                    var dr = br + r, dc = bc + c;
                    var sc = dc + shiftC;
                    if (dr < rows && dc < cols && dc >= 0) {
                        if (sc >= 0 && sc < cols) {
                            set(out, dr, dc, base[dr][sc]);
                        } else {
                            set(out, dr, dc, GLYPHS[Math.floor(rng() * GLYPHS.length)]);
                        }
                    }
                }
            }
        }
        // Fewer scattered replacements
        var scatter = Math.round(cols * rows * 0.005 * intensity);
        for (var i = 0; i < scatter; i++) {
            var r = Math.floor(rng() * rows);
            var c = Math.floor(rng() * cols);
            if (base[r][c] !== ' ')
                out[r][c] = GLYPHS[Math.floor(rng() * GLYPHS.length)];
        }
        return out;
    }
},

// Cell-shift: fill cells shift with sine wave
'cell-shift': {
    name: 'Cell Shift',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var t = frame / Math.max(1, total - 1);
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                if (isFill(base[r][c])) {
                    var shift = Math.round(Math.sin(t * Math.PI * 2 + r * 0.15 * intensity) * 3 * intensity);
                    var newC = c + shift;
                    out[r][c] = ' ';
                    if (newC >= 0 && newC < cols && (base[r][newC] === ' ' || isFill(base[r][newC])))
                        set(out, r, newC, base[r][c]);
                }
            }
        }
        return out;
    }
},

// Maze walker: smarter pathfinding, prefers corridors, short trail
'maze-walker': {
    name: 'Maze Walker',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var rng = mulberry32(777);
        // Find a starting empty cell
        var px = Math.floor(cols / 2), py = Math.floor(rows / 2);
        for (var attempt = 0; attempt < 200; attempt++) {
            var tx = Math.floor(cols * 0.2 + rng() * cols * 0.6);
            var ty = Math.floor(rows * 0.2 + rng() * rows * 0.6);
            if (base[ty] && base[ty][tx] === ' ') { px = tx; py = ty; break; }
        }
        // Build path with momentum (prefers continuing in same direction)
        var dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
        var pathLen = Math.round(total * 4 * (0.5 + intensity));
        var path = [[px, py]];
        var lastDir = 0;
        for (var step = 0; step < pathLen; step++) {
            var moved = false;
            // Try last direction first (momentum), then random others
            var order = [lastDir];
            for (var d = 0; d < 4; d++) { if (d !== lastDir) order.push(d); }
            // Occasionally shuffle to avoid getting stuck in loops
            if (rng() < 0.3) {
                for (var i = order.length - 1; i > 0; i--) {
                    var j = Math.floor(rng() * (i + 1));
                    var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
                }
            }
            for (var di = 0; di < order.length; di++) {
                var d = order[di];
                var nx = px + dirs[d][0], ny = py + dirs[d][1];
                if (nx > 0 && nx < cols - 1 && ny > 0 && ny < rows - 1 && base[ny][nx] === ' ') {
                    px = nx; py = ny;
                    path.push([px, py]);
                    lastDir = d;
                    moved = true;
                    break;
                }
            }
            if (!moved) path.push([px, py]);
        }
        var pathIdx = frame % path.length;
        var wx = path[pathIdx][0], wy = path[pathIdx][1];
        // Short trail: 3-5 cells
        var trailLen = 3 + Math.round(intensity * 2);
        for (var t = 1; t <= trailLen; t++) {
            var ti = (pathIdx - t + path.length) % path.length;
            var trailChar = t <= 1 ? '\u2593' : '\u2591';
            var ttx = path[ti][0], tty = path[ti][1];
            if (base[tty][ttx] === ' ') set(out, tty, ttx, trailChar);
        }
        set(out, wy, wx, '\u2588');
        return out;
    }
},

// Wave: sinusoidal displacement (kept as is, works well)
'wave': {
    name: 'Wave',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        var t = frame / Math.max(1, total - 1);
        var amp = intensity * 4;
        var freq = 0.12;
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var ch = base[r][c];
                if (ch === ' ') continue;
                if (isWall(ch)) {
                    set(out, r, c, ch);
                } else {
                    var dx = Math.round(Math.sin(t * Math.PI * 2 + r * freq) * amp);
                    var dy = Math.round(Math.cos(t * Math.PI * 2 + c * freq * 0.5) * amp * 0.3);
                    var nc = c + dx, nr = r + dy;
                    if (nc >= 0 && nc < cols && nr >= 0 && nr < rows)
                        set(out, nr, nc, ch);
                }
            }
        }
        return out;
    }
},

// Dissolve: mostly targets fill/empty areas, occasionally text
'dissolve': {
    name: 'Dissolve',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        var t = frame / Math.max(1, total - 1);
        var phase = t * 2;
        var threshold = phase <= 1 ? phase : 2 - phase;
        threshold *= intensity * 0.7;
        var rng = mulberry32(123);
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var noise = rng();
                var ch = base[r][c];
                // Text/walls are more resistant to dissolve
                var resist = (ch !== ' ' && !isFill(ch)) ? 0.7 : 0;
                if (noise > threshold - resist) {
                    out[r][c] = ch;
                } else if (ch !== ' ') {
                    // Replace with dot pattern instead of random glyphs
                    out[r][c] = rng() < 0.5 ? '\u2591' : ' ';
                }
            }
        }
        return out;
    }
},

// Scroll-rewrite: gentler scroll, narrower rewrite band
'scroll-rewrite': {
    name: 'Scroll Rewrite',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        var t = frame / Math.max(1, total - 1);
        var scrollOffset = Math.round(t * rows * intensity);
        var rng = mulberry32(Math.floor(frame / 2) * 3 + 99);
        for (var r = 0; r < rows; r++) {
            var srcRow = ((r + scrollOffset) % rows + rows) % rows;
            for (var c = 0; c < cols; c++) {
                var frontDist = Math.abs(r - ((rows - scrollOffset % rows) % rows));
                if (frontDist > rows / 2) frontDist = rows - frontDist;
                if (frontDist < 2 && base[srcRow][c] !== ' ') {
                    out[r][c] = GLYPHS[Math.floor(rng() * GLYPHS.length)];
                } else {
                    out[r][c] = base[srcRow][c];
                }
            }
        }
        return out;
    }
},

// Cell-swap: information cells move and reorder like sliding puzzle
'cell-swap': {
    name: 'Cell Swap',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        // Identify rectangular regions (blocks of non-empty content between walls)
        // Simplified: divide grid into horizontal bands and shift them
        var rng = mulberry32(55);
        var numBands = 4 + Math.floor(rng() * 6);
        var bandH = Math.floor(rows / numBands);
        var t = frame / Math.max(1, total - 1);

        for (var b = 0; b < numBands; b++) {
            var by = b * bandH;
            var bh = b === numBands - 1 ? rows - by : bandH;
            // Each band gets a horizontal offset that changes over time
            var speed = (rng() - 0.5) * 2;
            var offset = Math.round(Math.sin(t * Math.PI * 2 * speed + b * 1.5) * cols * 0.15 * intensity);
            // Sub-divide band into vertical chunks
            var numChunks = 1 + Math.floor(rng() * 3);
            var chunkW = Math.floor(cols / numChunks);
            for (var ch = 0; ch < numChunks; ch++) {
                var cx = ch * chunkW;
                var cw = ch === numChunks - 1 ? cols - cx : chunkW;
                var chunkOffset = offset + Math.round(Math.cos(t * Math.PI * 2 + ch * 2.1) * 5 * intensity);
                for (var r = 0; r < bh; r++) {
                    for (var c = 0; c < cw; c++) {
                        var srcR = by + r, srcC = cx + c;
                        var dstC = cx + ((c + chunkOffset) % cw + cw) % cw;
                        if (srcR < rows && srcC < cols && dstC < cols && dstC >= 0) {
                            var sch = base[srcR][srcC];
                            if (isWall(sch)) {
                                out[srcR][srcC] = sch;
                            } else {
                                set(out, srcR, dstC, sch);
                            }
                        }
                    }
                }
            }
        }
        return out;
    }
},

// Breathe: fill density pulses, text stays
'breathe': {
    name: 'Breathe',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var t = frame / Math.max(1, total - 1);
        var pulse = (Math.sin(t * Math.PI * 2) + 1) / 2;
        var densityScale = '\u2591\u2592\u2593\u2588';
        var rng = mulberry32(42);
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var ch = base[r][c];
                if (isFill(ch)) {
                    var idx = FILL_CHARS.indexOf(ch);
                    var localPulse = pulse + Math.sin(r * 0.2 + c * 0.1) * 0.3 * intensity;
                    localPulse = Math.max(0, Math.min(1, localPulse));
                    var newIdx = Math.round(localPulse * 3);
                    out[r][c] = densityScale[newIdx];
                    // At low pulse, some cells disappear
                    if (localPulse < 0.15 * intensity && rng() < 0.3) out[r][c] = ' ';
                }
            }
        }
        return out;
    }
},

// Scan: horizontal scan line reveals/transforms content
'scan': {
    name: 'Scan',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        var t = frame / Math.max(1, total - 1);
        var scanY = t * (rows + 6) - 3;
        var scanWidth = 3 + Math.round(intensity * 4);
        for (var r = 0; r < rows; r++) {
            var distFromScan = Math.abs(r - scanY);
            for (var c = 0; c < cols; c++) {
                if (distFromScan < scanWidth) {
                    // In scan zone: show inverted or highlighted
                    var ch = base[r][c];
                    if (ch === ' ') {
                        out[r][c] = distFromScan < 1 ? '\u2591' : ' ';
                    } else if (isFill(ch)) {
                        out[r][c] = distFromScan < 1 ? '\u2588' : ch;
                    } else {
                        out[r][c] = ch;
                    }
                } else if (r < scanY - scanWidth) {
                    // Already scanned: show content
                    out[r][c] = base[r][c];
                }
                // Below scan: empty (not yet revealed)
            }
        }
        return out;
    }
},

// Erosion: fill/structural chars erode from edges inward
'erosion': {
    name: 'Erosion',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var t = frame / Math.max(1, total - 1);
        var erosionDepth = Math.round(t * Math.max(cols, rows) * 0.5 * intensity);
        // Build distance-from-empty map
        var dist = [];
        for (var r = 0; r < rows; r++) {
            dist[r] = [];
            for (var c = 0; c < cols; c++) {
                if (base[r][c] === ' ') dist[r][c] = 0;
                else dist[r][c] = 9999;
            }
        }
        // Forward pass
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                if (r > 0 && dist[r-1][c] + 1 < dist[r][c]) dist[r][c] = dist[r-1][c] + 1;
                if (c > 0 && dist[r][c-1] + 1 < dist[r][c]) dist[r][c] = dist[r][c-1] + 1;
            }
        }
        // Backward pass
        for (var r = rows - 1; r >= 0; r--) {
            for (var c = cols - 1; c >= 0; c--) {
                if (r < rows - 1 && dist[r+1][c] + 1 < dist[r][c]) dist[r][c] = dist[r+1][c] + 1;
                if (c < cols - 1 && dist[r][c+1] + 1 < dist[r][c]) dist[r][c] = dist[r][c+1] + 1;
            }
        }
        // Erode: remove chars closest to empty space first
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var ch = base[r][c];
                if (ch !== ' ' && (isFill(ch) || isStructural(ch))) {
                    if (dist[r][c] <= erosionDepth) {
                        out[r][c] = ' ';
                    }
                }
            }
        }
        return out;
    }
},

// Pulse: fill areas rhythmically expand and contract
'pulse': {
    name: 'Pulse',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var t = frame / Math.max(1, total - 1);
        var pulse = Math.sin(t * Math.PI * 4) * 0.5 + 0.5;
        var expandRadius = Math.round(pulse * 3 * intensity);
        var rng = mulberry32(99);
        // Find edges of fill areas and toggle them
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var ch = base[r][c];
                if (isFill(ch)) {
                    // Check if this is an edge cell (adjacent to empty)
                    var isEdge = false;
                    for (var dr = -1; dr <= 1; dr++) {
                        for (var dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            var nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && base[nr][nc] === ' ') {
                                isEdge = true;
                            }
                        }
                    }
                    if (isEdge && pulse < 0.4) {
                        out[r][c] = rng() < (0.4 - pulse) * intensity ? ' ' : ch;
                    }
                } else if (ch === ' ' && pulse > 0.6) {
                    // Expand: check if adjacent to fill
                    var adjFill = false;
                    for (var dr = -1; dr <= 1; dr++) {
                        for (var dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            var nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && isFill(base[nr][nc])) {
                                adjFill = true;
                            }
                        }
                    }
                    if (adjFill && rng() < (pulse - 0.6) * intensity) {
                        out[r][c] = S.fillChar || '\u2591';
                    }
                }
            }
        }
        return out;
    }
},

// Cascade: diagonal wave reveals content from top-left to bottom-right
'cascade': {
    name: 'Cascade',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        var t = frame / Math.max(1, total - 1);
        // Diagonal front position: 0 to (cols + rows)
        var maxDiag = cols + rows;
        var frontPos = t * (maxDiag + 20);
        var waveWidth = 5 + Math.round(intensity * 10);
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var diag = r + c;
                if (diag < frontPos - waveWidth) {
                    // Fully revealed
                    out[r][c] = base[r][c];
                } else if (diag < frontPos) {
                    // In the wave front: show with possible distortion
                    var waveFrac = (frontPos - diag) / waveWidth;
                    if (base[r][c] !== ' ') {
                        out[r][c] = waveFrac > 0.5 ? base[r][c] : '\u2591';
                    }
                }
                // Beyond front: empty (not yet revealed)
            }
        }
        return out;
    }
},

// Flicker: random characters briefly flash to different block chars
'flicker': {
    name: 'Flicker',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var flickerSeed = frame * 13 + 7;
        var rng = mulberry32(flickerSeed);
        var flickerRate = 0.02 + intensity * 0.06;
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var ch = base[r][c];
                if (ch !== ' ' && rng() < flickerRate) {
                    if (isFill(ch)) {
                        // Swap to a different fill char
                        var idx = FILL_CHARS.indexOf(ch);
                        var newIdx = (idx + 1 + Math.floor(rng() * 3)) % 4;
                        out[r][c] = FILL_CHARS[newIdx];
                    } else if (!isWall(ch)) {
                        // Text: occasionally show a block char then revert
                        if (rng() < 0.3) out[r][c] = FILL_CHARS[Math.floor(rng() * 4)];
                    }
                }
            }
        }
        return out;
    }
},

// Gravity: non-structural characters fall downward, accumulating at bottom
'gravity': {
    name: 'Gravity',
    apply(base, frame, total, cols, rows, intensity) {
        var out = createGrid(cols, rows);
        var t = frame / Math.max(1, total - 1);
        var fallAmount = Math.round(t * rows * intensity);
        // Process each column independently
        for (var c = 0; c < cols; c++) {
            var falling = [];
            var anchored = [];
            for (var r = 0; r < rows; r++) {
                var ch = base[r][c];
                if (ch === ' ') continue;
                if (isWall(ch)) {
                    anchored.push({ r: r, ch: ch });
                } else {
                    falling.push({ r: r, ch: ch });
                }
            }
            // Place anchored chars in original positions
            for (var i = 0; i < anchored.length; i++) {
                set(out, anchored[i].r, c, anchored[i].ch);
            }
            // Drop falling chars
            for (var i = 0; i < falling.length; i++) {
                var newR = falling[i].r + fallAmount;
                if (newR >= rows) newR = rows - 1 - (falling.length - 1 - i);
                if (newR < 0) newR = 0;
                set(out, newR, c, falling[i].ch);
            }
        }
        return out;
    }
},

// Invert: filled and empty spaces swap, progressing top to bottom
'invert': {
    name: 'Invert',
    apply(base, frame, total, cols, rows, intensity) {
        var out = cloneGrid(base);
        var t = frame / Math.max(1, total - 1);
        var frontRow = Math.round(t * (rows + 10)) - 5;
        var transitionH = 5 + Math.round(intensity * 8);
        for (var r = 0; r < rows; r++) {
            var progress;
            if (r < frontRow - transitionH) progress = 1;
            else if (r > frontRow) progress = 0;
            else progress = (frontRow - r) / transitionH;
            progress = Math.max(0, Math.min(1, progress));
            for (var c = 0; c < cols; c++) {
                var ch = base[r][c];
                if (progress > 0.5) {
                    // Inverted zone
                    if (isFill(ch)) {
                        out[r][c] = ' ';
                    } else if (ch === ' ') {
                        out[r][c] = S.fillChar || '\u2591';
                    }
                    // Text and walls stay
                }
            }
        }
        return out;
    }
},

}; // end ANIMS

// === RENDERER =========================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let baseGrid = null;
let currentGrid = null;
let currentCols = 0, currentRows = 0;

function getFont() {
    return '"Degular Mono", "SF Mono", "Fira Code", "Consolas", monospace';
}

function getHeadingFont() {
    var parts = S.headingFont.split('-');
    var family = parts[0] === 'display' ? '"Degular Display"' : '"Degular Mono"';
    var weights = { regular: '400', semibold: '600', bold: '700', black: '900' };
    var w = weights[parts[1]] || '600';
    return w + ' {SIZE}px ' + family + ', "SF Mono", "Fira Code", "Consolas", monospace';
}

// === IMAGE ============================================================

var loadedImage = null; // HTMLImageElement or null
var ditherCache = null; // { src, filter, canvas } - cached dithered version

function applyFloydSteinberg(srcCanvas) {
    var w = srcCanvas.width, h = srcCanvas.height;
    var ctx = srcCanvas.getContext('2d');
    var imgData = ctx.getImageData(0, 0, w, h);
    var d = imgData.data;
    // Convert to grayscale float buffer
    var gray = new Float32Array(w * h);
    for (var i = 0; i < w * h; i++) {
        gray[i] = d[i * 4] * 0.299 + d[i * 4 + 1] * 0.587 + d[i * 4 + 2] * 0.114;
    }
    // Floyd-Steinberg error diffusion
    for (var y = 0; y < h; y++) {
        for (var x = 0; x < w; x++) {
            var idx = y * w + x;
            var old = gray[idx];
            var nw = old < 128 ? 0 : 255;
            gray[idx] = nw;
            var err = old - nw;
            if (x + 1 < w)               gray[idx + 1]     += err * 7 / 16;
            if (y + 1 < h && x > 0)      gray[idx + w - 1] += err * 3 / 16;
            if (y + 1 < h)               gray[idx + w]     += err * 5 / 16;
            if (y + 1 < h && x + 1 < w)  gray[idx + w + 1] += err * 1 / 16;
        }
    }
    // Write back
    for (var i = 0; i < w * h; i++) {
        var v = Math.max(0, Math.min(255, Math.round(gray[i])));
        d[i * 4] = v; d[i * 4 + 1] = v; d[i * 4 + 2] = v;
    }
    ctx.putImageData(imgData, 0, 0);
    return srcCanvas;
}

// Bayer 8x8 ordered dithering matrix (normalized 0-63)
var BAYER8 = [
     0, 32,  8, 40,  2, 34, 10, 42,
    48, 16, 56, 24, 50, 18, 58, 26,
    12, 44,  4, 36, 14, 46,  6, 38,
    60, 28, 52, 20, 62, 30, 54, 22,
     3, 35, 11, 43,  1, 33,  9, 41,
    51, 19, 59, 27, 49, 17, 57, 25,
    15, 47,  7, 39, 13, 45,  5, 37,
    63, 31, 55, 23, 61, 29, 53, 21
];

function applyBayer(srcCanvas) {
    var w = srcCanvas.width, h = srcCanvas.height;
    var ctx = srcCanvas.getContext('2d');
    var imgData = ctx.getImageData(0, 0, w, h);
    var d = imgData.data;
    for (var y = 0; y < h; y++) {
        for (var x = 0; x < w; x++) {
            var idx = (y * w + x) * 4;
            var gray = d[idx] * 0.299 + d[idx + 1] * 0.587 + d[idx + 2] * 0.114;
            // Threshold from Bayer matrix (scaled to 0-255)
            var threshold = (BAYER8[(y & 7) * 8 + (x & 7)] + 0.5) / 64 * 255;
            var v = gray > threshold ? 255 : 0;
            d[idx] = v; d[idx + 1] = v; d[idx + 2] = v;
        }
    }
    ctx.putImageData(imgData, 0, 0);
    return srcCanvas;
}

function applyGamma(canvas, gamma) {
    if (gamma === 1.0) return;
    var ctx = canvas.getContext('2d');
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data;
    var invGamma = 1.0 / gamma;
    // Build lookup table
    var lut = new Uint8Array(256);
    for (var i = 0; i < 256; i++) {
        lut[i] = Math.round(255 * Math.pow(i / 255, invGamma));
    }
    for (var i = 0; i < d.length; i += 4) {
        d[i] = lut[d[i]];
        d[i + 1] = lut[d[i + 1]];
        d[i + 2] = lut[d[i + 2]];
    }
    ctx.putImageData(imgData, 0, 0);
}

function getFilteredImage(img, filter, sx, sy, sw, sh, targetW, targetH) {
    var imgS = S.image;
    // Check cache - include all adjustment params in key
    var cacheKey = filter + '_' + sx + '_' + sy + '_' + sw + '_' + sh + '_' + targetW + '_' + targetH +
        '_b' + imgS.brightness + '_c' + imgS.contrast + '_g' + imgS.gamma + '_bl' + imgS.blur + '_r' + imgS.ditherRes;
    if (ditherCache && ditherCache.src === img.src && ditherCache.key === cacheKey) {
        return ditherCache.canvas;
    }

    // If no filter and no adjustments, skip
    var hasAdjust = imgS.brightness !== 0 || imgS.contrast !== 0 || imgS.gamma !== 1.0 || imgS.blur > 0;
    if (filter === 'none' && !hasAdjust) return null;

    // For dither/bayer, process at ditherRes% of target resolution for visible pixels
    var procW = targetW, procH = targetH;
    if (filter !== 'none') {
        var scale = imgS.ditherRes / 100;
        procW = Math.max(20, Math.round(targetW * scale));
        procH = Math.max(20, Math.round(targetH * scale));
    }

    // Draw cropped image to temp canvas
    var tmp = document.createElement('canvas');
    tmp.width = procW; tmp.height = procH;
    var tmpCtx = tmp.getContext('2d');

    // Apply brightness/contrast/blur via CSS filter
    var filters = [];
    if (imgS.brightness !== 0) filters.push('brightness(' + (100 + imgS.brightness) + '%)');
    if (imgS.contrast !== 0) filters.push('contrast(' + (100 + imgS.contrast) + '%)');
    if (imgS.blur > 0) filters.push('blur(' + imgS.blur + 'px)');
    if (filters.length) tmpCtx.filter = filters.join(' ');
    tmpCtx.drawImage(img, sx, sy, sw, sh, 0, 0, procW, procH);
    tmpCtx.filter = 'none';

    // Apply gamma (pixel-level, after CSS filters)
    if (imgS.gamma !== 1.0) applyGamma(tmp, imgS.gamma);

    var result;
    if (filter === 'dither') {
        result = applyFloydSteinberg(tmp);
    } else if (filter === 'bayer') {
        result = applyBayer(tmp);
    } else {
        // Just adjustments, no dither
        result = tmp;
    }

    ditherCache = { src: img.src, key: cacheKey, canvas: result };
    return result;
}

function drawImageLayer(targetCtx, logicalW, logicalH, marginPx) {
    if (!loadedImage) return;
    var img = loadedImage;
    var imgS = S.image;

    // Source crop (percentages of original image)
    var sx = Math.round(img.naturalWidth * imgS.cropLeft / 100);
    var sy = Math.round(img.naturalHeight * imgS.cropTop / 100);
    var sw = Math.round(img.naturalWidth * (100 - imgS.cropLeft - imgS.cropRight) / 100);
    var sh = Math.round(img.naturalHeight * (100 - imgS.cropTop - imgS.cropBottom) / 100);
    if (sw <= 0 || sh <= 0) return;

    // Destination area depends on align mode
    var dx, dy, dw, dh;
    if (imgS.align === 'grid') {
        dx = marginPx;
        dw = logicalW - marginPx * 2;
    } else {
        dx = 0;
        dw = logicalW;
    }

    // Scale image to fill destination width, preserving aspect ratio
    var srcAspect = sw / sh;
    var drawW = dw;
    var drawH = drawW / srcAspect;

    // Vertical position
    var areaTop = (imgS.align === 'grid') ? marginPx : 0;
    var areaH = (imgS.align === 'grid') ? (logicalH - marginPx * 2) : logicalH;

    if (imgS.position === 'top') {
        dy = areaTop;
    } else if (imgS.position === 'center') {
        dy = areaTop + (areaH - drawH) / 2;
    } else {
        dy = areaTop + areaH - drawH;
    }

    // Apply offset (percentage of canvas dimensions)
    dx += logicalW * imgS.offsetX / 100;
    dy += logicalH * imgS.offsetY / 100;

    // Draw with opacity
    var prevAlpha = targetCtx.globalAlpha;
    targetCtx.globalAlpha = imgS.opacity;

    // Apply filter if needed
    var filtered = getFilteredImage(img, imgS.filter, sx, sy, sw, sh, Math.round(drawW), Math.round(drawH));
    if (filtered) {
        // Pixelated rendering for low-res dithering
        targetCtx.imageSmoothingEnabled = (imgS.filter === 'none');
        targetCtx.drawImage(filtered, 0, 0, filtered.width, filtered.height, dx, dy, drawW, drawH);
        targetCtx.imageSmoothingEnabled = true;
    } else {
        targetCtx.drawImage(img, sx, sy, sw, sh, dx, dy, drawW, drawH);
    }

    targetCtx.globalAlpha = prevAlpha;
}

function renderToContext(targetCtx, grid, cols, rows, fontSize, leading, headingsArr, boldsArr) {
    var font = getFont();
    targetCtx.font = fontSize + 'px ' + font;
    var charW = targetCtx.measureText('M').width;
    var charH = leading;
    var marginPx = S.margin * (fontSize / 10);

    var gridW = Math.ceil(cols * charW);
    var gridH = rows * charH;
    var logicalW = gridW + marginPx * 2;
    var logicalH = gridH + marginPx * 2;
    var yOff = (charH - fontSize) * 0.35;

    // Layer 1: Background (fills entire canvas incl margin)
    targetCtx.fillStyle = S.bgColor;
    targetCtx.fillRect(0, 0, logicalW, logicalH);

    // Layer 2: Image (between background and text, unless imageOnTop)
    if (!S.imageOnTop) {
        targetCtx.globalCompositeOperation = 'source-over';
        drawImageLayer(targetCtx, logicalW, logicalH, marginPx);
    }

    // Layer 3: Foreground (Type) with blend mode, offset by margin
    targetCtx.globalCompositeOperation = S.blendMode;
    targetCtx.fillStyle = S.fgColor;
    targetCtx.font = fontSize + 'px ' + font;
    targetCtx.textBaseline = 'top';

    var ox = marginPx, oy = marginPx;

    // Draw grid characters
    for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
            var ch = grid[r][c];
            if (ch !== ' ') {
                targetCtx.fillText(ch, ox + c * charW, oy + r * charH + yOff);
            }
        }
    }

    // Heading overlay at scaled size with optional different font weight
    // Vertically center enlarged heading text within its grid row
    if (S.headingScale > 1 && headingsArr && headingsArr.length) {
        var hFontSize = fontSize * S.headingScale;
        var hFontStr = getHeadingFont().replace('{SIZE}', hFontSize);
        targetCtx.font = hFontStr;
        var isProportional = S.headingFont.indexOf('display-') === 0;
        var hCharW = targetCtx.measureText('M').width;
        // Offset: move heading up so it's vertically centered on its grid row
        var hYOffset = -(hFontSize - fontSize) * 0.5;

        for (var hi = 0; hi < headingsArr.length; hi++) {
            var h = headingsArr[hi];
            var startX = ox + h.c * charW;
            var startY = oy + h.r * charH + yOff + hYOffset;
            // Optional background rectangle behind heading
            if (S.headingBg) {
                targetCtx.save();
                targetCtx.globalCompositeOperation = 'source-over';
                targetCtx.fillStyle = S.bgColor;
                var textW = isProportional ? targetCtx.measureText(h.text).width : h.text.length * hCharW;
                var bgPadX = charW * 0.5;
                var bgPadTop, bgPadBot;
                if (S.headingScale >= 3) {
                    // 3x: artist (first heading) gets generous top, title stays tight
                    bgPadTop = hi === 0 ? hFontSize * 0.15 : hFontSize * 0.05;
                    bgPadBot = hFontSize * -0.15;
                } else {
                    // 1.5x, 2x: moderate top, same tight bottom
                    bgPadTop = hFontSize * 0.1;
                    bgPadBot = hFontSize * -0.15;
                }
                targetCtx.fillRect(startX - bgPadX, startY - bgPadTop, textW + bgPadX * 2, hFontSize + bgPadTop + bgPadBot);
                targetCtx.restore();
                targetCtx.globalCompositeOperation = S.blendMode;
                targetCtx.fillStyle = S.fgColor;
                targetCtx.font = hFontStr;
            }
            if (isProportional) {
                targetCtx.fillText(h.text, startX, startY);
            } else {
                for (var i = 0; i < h.text.length; i++) {
                    targetCtx.fillText(h.text[i], startX + i * hCharW, startY);
                }
            }
        }
    }

    // Bold text overlay: same size, bold weight
    if (boldsArr && boldsArr.length) {
        targetCtx.font = 'bold ' + fontSize + 'px ' + font;
        for (var bi = 0; bi < boldsArr.length; bi++) {
            var b = boldsArr[bi];
            var bx = ox + b.c * charW;
            var by = oy + b.r * charH + yOff;
            for (var i = 0; i < b.text.length; i++) {
                targetCtx.fillText(b.text[i], bx + i * charW, by);
            }
        }
    }

    // Layer 4: Image on top (optional)
    if (S.imageOnTop) {
        targetCtx.globalCompositeOperation = S.blendMode;
        drawImageLayer(targetCtx, logicalW, logicalH, marginPx);
    }

    targetCtx.globalCompositeOperation = 'source-over';

    return { logicalW: logicalW, logicalH: logicalH, charW: charW, charH: charH };
}

function buildBaseGrid() {
    var cols = S.cols;
    var rows = computeRows(cols, S.aspectRatio);
    currentCols = cols;
    currentRows = rows;

    headings = [];
    boldTexts = [];
    var grid = createGrid(cols, rows);
    var preset = PRESETS[S.preset];
    if (preset) preset.build(grid, cols, rows, getActiveContent());
    baseGrid = grid;
    return { grid: grid, headings: headings.slice(), bolds: boldTexts.slice() };
}

function render(frameOverride) {
    var baseResult = buildBaseGrid();
    var savedHeadings = baseResult.headings;
    var savedBolds = baseResult.bolds;

    var cols = currentCols;
    var rows = currentRows;
    var frame = frameOverride !== undefined ? frameOverride : S.anim.frame;
    var total = totalFrames();

    // Apply animation effect
    var animFn = ANIMS[S.anim.effect];
    var grid;
    if (animFn && S.anim.effect !== 'none') {
        grid = animFn.apply(baseGrid, frame, total, cols, rows, S.anim.intensity);
    } else {
        grid = cloneGrid(baseGrid);
    }
    currentGrid = grid;

    // Measure for canvas sizing
    var font = getFont();
    var fontSize = S.fontSize;
    var leading = S.leading;
    var marginPx = S.margin * (fontSize / 10);
    ctx.font = fontSize + 'px ' + font;
    var charW = ctx.measureText('M').width;
    var charH = leading;

    var logicalW = Math.ceil(cols * charW) + marginPx * 2;
    var logicalH = rows * charH + marginPx * 2;
    var dpr = window.devicePixelRatio || 1;

    canvas.width = logicalW * dpr;
    canvas.height = logicalH * dpr;

    // Fit to viewport
    var container = document.getElementById('canvasContainer');
    var maxW = container.clientWidth - 40;
    var maxH = container.clientHeight - 40;
    var scale = Math.min(maxW / logicalW, maxH / logicalH, 1);
    canvas.style.width = Math.round(logicalW * scale) + 'px';
    canvas.style.height = Math.round(logicalH * scale) + 'px';

    // Render at DPR scale
    ctx.scale(dpr, dpr);
    var dims = renderToContext(ctx, grid, cols, rows, fontSize, leading, savedHeadings, savedBolds);

    // Update status
    document.getElementById('statusDims').textContent = cols + ' x ' + rows;
    document.getElementById('statusPreset').textContent = (PRESETS[S.preset] || {}).name || '\u2014';
    document.getElementById('statusAnim').textContent = S.anim.effect;
    document.getElementById('statusFrame').textContent = frame + '/' + total;
    document.getElementById('statusOutput').textContent = dims.logicalW + 'x' + dims.logicalH + ' px';
    document.getElementById('infoDims').textContent = cols + ' x ' + rows;
    document.getElementById('infoOutput').textContent = dims.logicalW + ' x ' + dims.logicalH + ' px';
    document.getElementById('frameVal').textContent = frame + ' / ' + total;

    return dims;
}

var renderTimer = null;
function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(function() { render(); }, 50);
}

// === ANIMATION LOOP ===================================================

var animFrameId = null;
var animStartTime = 0;

function animationLoop(timestamp) {
    if (!S.anim.playing) return;

    var elapsed = (timestamp - animStartTime) / 1000;
    var total = totalFrames();
    var fps = S.anim.fps;
    var targetFrame = Math.floor(elapsed * fps);

    if (S.anim.loop) {
        targetFrame = targetFrame % total;
    } else {
        if (targetFrame >= total) {
            targetFrame = total - 1;
            stopAnimation();
            return;
        }
    }

    if (targetFrame !== S.anim.frame) {
        S.anim.frame = targetFrame;
        document.getElementById('frameScrub').value = targetFrame;
        render(targetFrame);
    }

    animFrameId = requestAnimationFrame(animationLoop);
}

function playAnimation() {
    if (S.anim.playing) return;
    S.anim.playing = true;
    var total = totalFrames();
    // If at end, restart
    if (S.anim.frame >= total - 1) S.anim.frame = 0;
    animStartTime = performance.now() - (S.anim.frame / S.anim.fps) * 1000;
    document.getElementById('btnPlay').classList.add('playing');
    document.getElementById('btnPlay').innerHTML = '&#10074;&#10074;';
    animFrameId = requestAnimationFrame(animationLoop);
}

function pauseAnimation() {
    S.anim.playing = false;
    if (animFrameId) cancelAnimationFrame(animFrameId);
    animFrameId = null;
    document.getElementById('btnPlay').classList.remove('playing');
    document.getElementById('btnPlay').innerHTML = '&#9654;';
}

function stopAnimation() {
    pauseAnimation();
    S.anim.frame = 0;
    document.getElementById('frameScrub').value = 0;
    render(0);
}

function togglePlay() {
    if (S.anim.playing) pauseAnimation();
    else playAnimation();
}

async function exportWebM() {
    var total = totalFrames();
    var fps = S.anim.fps;
    var btn = document.getElementById('exportWebm');
    btn.textContent = 'Recording...';
    showProgress(0);

    // Render first frame to get dimensions
    var firstCanvas = renderExportFrame(0);
    var w = firstCanvas.width;
    var h = firstCanvas.height;

    // Create recording canvas
    var recCanvas = document.createElement('canvas');
    recCanvas.width = w;
    recCanvas.height = h;
    var recCtx = recCanvas.getContext('2d');

    var stream = recCanvas.captureStream(0); // manual frame control
    var mimeType = 'video/webm;codecs=vp9';
    if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'video/webm;codecs=vp8';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = 'video/webm';
        }
    }
    var recorder = new MediaRecorder(stream, { mimeType: mimeType, videoBitsPerSecond: 8000000 });
    var chunks = [];
    recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };

    var done = new Promise(function(resolve) { recorder.onstop = resolve; });
    recorder.start();

    var videoTrack = stream.getVideoTracks()[0];

    for (var f = 0; f < total; f++) {
        var frameCanvas = renderExportFrame(f);
        recCtx.clearRect(0, 0, w, h);
        recCtx.drawImage(frameCanvas, 0, 0);
        if (videoTrack.requestFrame) videoTrack.requestFrame();
        showProgress(Math.round((f / total) * 100));
        // Wait for frame interval
        await new Promise(function(r) { setTimeout(r, 1000 / fps); });
    }

    recorder.stop();
    await done;

    var blob = new Blob(chunks, { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'poster_' + S.preset + '_' + S.anim.effect + '_' + total + 'f.webm';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    btn.textContent = 'WebM Video';
    showProgress(-1);
}

// -- Minimal MP4/MOV Muxer (H.264 / AVC in ISO BMFF) ---------------

function mp4Box(type) {
    var payloads = [];
    var contentSize = 0;
    for (var i = 1; i < arguments.length; i++) {
        payloads.push(arguments[i]);
        contentSize += arguments[i].byteLength;
    }
    var buf = new Uint8Array(8 + contentSize);
    var view = new DataView(buf.buffer);
    view.setUint32(0, 8 + contentSize);
    buf[4] = type.charCodeAt(0);
    buf[5] = type.charCodeAt(1);
    buf[6] = type.charCodeAt(2);
    buf[7] = type.charCodeAt(3);
    var off = 8;
    for (var i = 0; i < payloads.length; i++) {
        buf.set(payloads[i], off);
        off += payloads[i].byteLength;
    }
    return buf;
}

function mp4U32(v) { var b = new Uint8Array(4); new DataView(b.buffer).setUint32(0, v); return b; }
function mp4U16(v) { var b = new Uint8Array(2); new DataView(b.buffer).setUint16(0, v); return b; }
function mp4S4(s) { return new Uint8Array([s.charCodeAt(0), s.charCodeAt(1), s.charCodeAt(2), s.charCodeAt(3)]); }
function mp4Zeros(n) { return new Uint8Array(n); }
function mp4Cat() {
    var total = 0;
    for (var i = 0; i < arguments.length; i++) total += arguments[i].byteLength;
    var r = new Uint8Array(total);
    var o = 0;
    for (var i = 0; i < arguments.length; i++) { r.set(arguments[i], o); o += arguments[i].byteLength; }
    return r;
}

function muxToMP4(encodedSamples, avcCData, width, height, fps, isMov) {
    var totalSamples = encodedSamples.length;
    var timescale = fps;
    var sampleDuration = 1;
    var trackDuration = totalSamples;
    var movieTimescale = 1000;
    var movieDuration = Math.round(totalSamples * movieTimescale / fps);

    var mdatContentSize = 0;
    var sampleSizes = [];
    var keyFrames = [];
    for (var i = 0; i < totalSamples; i++) {
        var sz = encodedSamples[i].data.byteLength;
        sampleSizes.push(sz);
        mdatContentSize += sz;
        if (encodedSamples[i].isKey) keyFrames.push(i + 1);
    }

    // ftyp
    var ftyp;
    if (isMov) {
        ftyp = mp4Box('ftyp', mp4S4('qt  '), mp4U32(0x20070900), mp4S4('qt  '));
    } else {
        ftyp = mp4Box('ftyp', mp4S4('isom'), mp4U32(0x200), mp4S4('isom'), mp4S4('iso2'), mp4S4('avc1'), mp4S4('mp41'));
    }

    var mdatHeaderSize = 8;
    var chunkOffset = ftyp.byteLength + mdatHeaderSize;

    // mvhd
    var mvhdData = mp4Cat(
        mp4Zeros(4),
        mp4U32(0), mp4U32(0),
        mp4U32(movieTimescale), mp4U32(movieDuration),
        mp4U32(0x00010000), mp4U16(0x0100),
        mp4Zeros(10),
        mp4U32(0x00010000), mp4Zeros(4), mp4Zeros(4),
        mp4Zeros(4), mp4U32(0x00010000), mp4Zeros(4),
        mp4Zeros(4), mp4Zeros(4), mp4U32(0x40000000),
        mp4Zeros(24),
        mp4U32(2)
    );
    var mvhd = mp4Box('mvhd', mvhdData);

    // tkhd
    var tkhdData = mp4Cat(
        new Uint8Array([0, 0, 0, 3]),
        mp4U32(0), mp4U32(0),
        mp4U32(1),
        mp4Zeros(4),
        mp4U32(movieDuration),
        mp4Zeros(8),
        mp4U16(0), mp4U16(0),
        mp4U16(0), mp4Zeros(2),
        mp4U32(0x00010000), mp4Zeros(4), mp4Zeros(4),
        mp4Zeros(4), mp4U32(0x00010000), mp4Zeros(4),
        mp4Zeros(4), mp4Zeros(4), mp4U32(0x40000000),
        mp4U32(width << 16),
        mp4U32(height << 16)
    );
    var tkhd = mp4Box('tkhd', tkhdData);

    // mdhd
    var mdhdData = mp4Cat(
        mp4Zeros(4),
        mp4U32(0), mp4U32(0),
        mp4U32(timescale), mp4U32(trackDuration),
        mp4U16(0x55C4),
        mp4Zeros(2)
    );
    var mdhd = mp4Box('mdhd', mdhdData);

    // hdlr
    var handlerName = new TextEncoder().encode('VideoHandler\0');
    var hdlrData = mp4Cat(
        mp4Zeros(4),
        mp4Zeros(4),
        mp4S4('vide'),
        mp4Zeros(12),
        handlerName
    );
    var hdlr = mp4Box('hdlr', hdlrData);

    // vmhd
    var vmhd = mp4Box('vmhd', mp4Cat(
        new Uint8Array([0, 0, 0, 1]),
        mp4U16(0), mp4Zeros(6)
    ));

    // dinf > dref > url
    var urlBox = mp4Box('url ', new Uint8Array([0, 0, 0, 1]));
    var dref = mp4Box('dref', mp4Cat(mp4Zeros(4), mp4U32(1)), urlBox);
    var dinf = mp4Box('dinf', dref);

    // stsd > avc1 > avcC
    var avcC = mp4Box('avcC', avcCData);
    var compressorName = new Uint8Array(32);
    var avc1Content = mp4Cat(
        mp4Zeros(6),
        mp4U16(1),
        mp4U16(0), mp4U16(0),
        mp4Zeros(12),
        mp4U16(width), mp4U16(height),
        mp4U32(0x00480000), mp4U32(0x00480000),
        mp4Zeros(4),
        mp4U16(1),
        compressorName,
        mp4U16(0x0018),
        new Uint8Array([0xFF, 0xFF])
    );
    var avc1 = mp4Box('avc1', avc1Content, avcC);
    var stsd = mp4Box('stsd', mp4Cat(mp4Zeros(4), mp4U32(1)), avc1);

    // stts
    var stts = mp4Box('stts', mp4Cat(
        mp4Zeros(4), mp4U32(1),
        mp4U32(totalSamples), mp4U32(sampleDuration)
    ));

    // stsc
    var stsc = mp4Box('stsc', mp4Cat(
        mp4Zeros(4), mp4U32(1),
        mp4U32(1), mp4U32(totalSamples), mp4U32(1)
    ));

    // stsz
    var stszBuf = new Uint8Array(12 + totalSamples * 4);
    var stszV = new DataView(stszBuf.buffer);
    stszV.setUint32(4, 0);
    stszV.setUint32(8, totalSamples);
    for (var i = 0; i < totalSamples; i++) stszV.setUint32(12 + i * 4, sampleSizes[i]);
    var stsz = mp4Box('stsz', stszBuf);

    // stco
    var stco = mp4Box('stco', mp4Cat(
        mp4Zeros(4), mp4U32(1), mp4U32(chunkOffset)
    ));

    // stss (sync samples / keyframes)
    var stssBuf = new Uint8Array(8 + keyFrames.length * 4);
    var stssV = new DataView(stssBuf.buffer);
    stssV.setUint32(4, keyFrames.length);
    for (var i = 0; i < keyFrames.length; i++) stssV.setUint32(8 + i * 4, keyFrames[i]);
    var stss = mp4Box('stss', stssBuf);

    // Assemble
    var stbl = mp4Box('stbl', stsd, stts, stsc, stsz, stco, stss);
    var minf = mp4Box('minf', vmhd, dinf, stbl);
    var mdia = mp4Box('mdia', mdhd, hdlr, minf);
    var trak = mp4Box('trak', tkhd, mdia);
    var moov = mp4Box('moov', mvhd, trak);

    // mdat header
    var mdatHeader = new Uint8Array(8);
    var mhv = new DataView(mdatHeader.buffer);
    mhv.setUint32(0, mdatHeaderSize + mdatContentSize);
    mdatHeader[4] = 0x6D; mdatHeader[5] = 0x64; mdatHeader[6] = 0x61; mdatHeader[7] = 0x74;

    // mdat content
    var mdatContent = new Uint8Array(mdatContentSize);
    var mOff = 0;
    for (var i = 0; i < totalSamples; i++) {
        mdatContent.set(encodedSamples[i].data, mOff);
        mOff += encodedSamples[i].data.byteLength;
    }

    // Final file: ftyp + mdat + moov
    return mp4Cat(ftyp, mdatHeader, mdatContent, moov);
}

// -- WebCodecs-based Video Export (H.264 MP4/MOV) -----------

async function exportVideoH264(format) {
    if (typeof VideoEncoder === 'undefined' || typeof VideoFrame === 'undefined') {
        alert('Your browser does not support WebCodecs API (required for ' + format.toUpperCase() + ').\n'
            + 'Please use Chrome/Edge 94+ or Safari 16.4+.\n'
            + 'Use WebM or PNG sequence as fallback.');
        return;
    }

    var total = totalFrames();
    var fps = S.anim.fps;
    var formatLabel = format.toUpperCase();
    var btnId = format === 'mov' ? 'exportMov' : 'exportMp4';
    var btn = document.getElementById(btnId);
    btn.textContent = 'Encoding...';
    showProgress(0);

    var firstCanvas = renderExportFrame(0);
    var w = firstCanvas.width;
    var h = firstCanvas.height;
    // H.264 requires even dimensions
    if (w % 2 !== 0) w++;
    if (h % 2 !== 0) h++;

    var encodedSamples = [];
    var avcCData = null;
    var encodeError = null;

    var encoder = new VideoEncoder({
        output: function(chunk, metadata) {
            var data = new Uint8Array(chunk.byteLength);
            chunk.copyTo(data);
            encodedSamples.push({ data: data, isKey: chunk.type === 'key' });
            if (!avcCData && metadata && metadata.decoderConfig && metadata.decoderConfig.description) {
                avcCData = new Uint8Array(metadata.decoderConfig.description);
            }
        },
        error: function(e) {
            console.error('VideoEncoder error:', e);
            encodeError = e;
        }
    });

    // Choose codec profile based on resolution
    var codecString = 'avc1.42001f'; // Baseline Level 3.1
    if (w > 1280 || h > 720) codecString = 'avc1.640028'; // High Level 4.0
    if (w > 1920 || h > 1080) codecString = 'avc1.640032'; // High Level 5.0

    try {
        encoder.configure({
            codec: codecString,
            width: w,
            height: h,
            bitrate: 8000000,
            framerate: fps,
            avc: { format: 'avc' }  // NAL units with length prefix (MP4-compatible)
        });
    } catch (e) {
        btn.textContent = formatLabel + ' Video';
        showProgress(-1);
        alert('Failed to configure H.264 encoder: ' + e.message + '\nTry WebM or PNG sequence export.');
        return;
    }

    var gopSize = Math.max(1, Math.round(fps)); // Keyframe every ~1 second

    for (var f = 0; f < total; f++) {
        if (encodeError) break;

        var frameCanvas = renderExportFrame(f);
        // Pad to even dimensions
        var padCanvas = document.createElement('canvas');
        padCanvas.width = w; padCanvas.height = h;
        var padCtx = padCanvas.getContext('2d');
        padCtx.fillStyle = S.bgColor;
        padCtx.fillRect(0, 0, w, h);
        padCtx.drawImage(frameCanvas, 0, 0);

        var vf = new VideoFrame(padCanvas, {
            timestamp: Math.round(f * (1000000 / fps)),
            duration: Math.round(1000000 / fps)
        });

        encoder.encode(vf, { keyFrame: (f % gopSize === 0) });
        vf.close();

        showProgress(Math.round((f / total) * 70));
        if (f % 4 === 0) await new Promise(function(r) { requestAnimationFrame(r); });
    }

    await encoder.flush();
    encoder.close();

    if (encodeError || !avcCData || encodedSamples.length === 0) {
        btn.textContent = formatLabel + ' Video';
        showProgress(-1);
        alert('Failed to encode video. Try WebM or PNG sequence export.');
        return;
    }

    showProgress(85);
    await new Promise(function(r) { setTimeout(r, 50); });

    var isMov = format === 'mov';
    var fileData = muxToMP4(encodedSamples, avcCData, w, h, fps, isMov);

    var blobType = isMov ? 'video/quicktime' : 'video/mp4';
    var blob = new Blob([fileData], { type: blobType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'poster_' + S.preset + '_' + S.anim.effect + '_' + total + 'f.' + format;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    btn.textContent = formatLabel + ' Video';
    showProgress(-1);
}

function exportMP4() { return exportVideoH264('mp4'); }
function exportMOV() { return exportVideoH264('mov'); }

async function exportSequence(format) {
    var total = totalFrames();
    var btn = format === 'png' ? document.getElementById('exportPngSeq') : document.getElementById('exportJpgSeq');
    var origText = btn.textContent;
    btn.textContent = 'Rendering...';
    showProgress(0);

    // Collect blobs
    var blobs = [];
    for (var f = 0; f < total; f++) {
        var frameCanvas = renderExportFrame(f);
        var blob = await new Promise(function(resolve) {
            if (format === 'png') frameCanvas.toBlob(resolve, 'image/png');
            else frameCanvas.toBlob(resolve, 'image/jpeg', 0.92);
        });
        blobs.push(blob);
        showProgress(Math.round((f / total) * 100));
    }

    // Download as zip-like sequence (individual files via click)
    // For simplicity, download each frame
    btn.textContent = 'Downloading...';
    for (var i = 0; i < blobs.length; i++) {
        var url = URL.createObjectURL(blobs[i]);
        var a = document.createElement('a');
        a.href = url;
        var pad = String(i).padStart(4, '0');
        a.download = 'poster_' + S.preset + '_' + S.anim.effect + '_' + pad + '.' + format;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        // Small delay to avoid browser blocking
        await new Promise(function(r) { setTimeout(r, 50); });
    }

    btn.textContent = origText;
    showProgress(-1);
}

function updateFrameScrub() {

    var scrub = document.getElementById('frameScrub');
    scrub.max = Math.max(0, total - 1);
    if (S.anim.frame >= total) S.anim.frame = total - 1;
    scrub.value = S.anim.frame;
    document.getElementById('totalFramesInfo').textContent = total;
    document.getElementById('frameVal').textContent = S.anim.frame + ' / ' + total;
}

function bindControls() {
    // Aspect ratio presets — auto-adjust columns to keep content visible
    document.querySelectorAll('.aspect-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.aspect-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            var parts = btn.dataset.ratio.split(':').map(Number);
            S.aspectRatio = parts;
            var newCols = autoColumns(parts);
            S.cols = newCols;
            var slider = document.getElementById('cols');
            slider.value = newCols;
            document.getElementById('colsVal').textContent = newCols;
            scheduleRender();
        });
    });

    // Layout presets
    document.querySelectorAll('.preset-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.preset = btn.dataset.preset;
            scheduleRender();
        });
    });

    // Heading scale
    document.querySelectorAll('.heading-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.heading-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.headingScale = Number(btn.dataset.scale);
            scheduleRender();
        });
    });

    // Heading font
    document.getElementById('headingFont').addEventListener('change', function(e) {
        S.headingFont = e.target.value;
        scheduleRender();
    });

    // Heading background
    document.getElementById('headingBg').addEventListener('change', function(e) {
        S.headingBg = e.target.checked;
        scheduleRender();
    });

    // Image on top
    document.getElementById('imageOnTop').addEventListener('change', function(e) {
        S.imageOnTop = e.target.checked;
        scheduleRender();
    });

    // Animation presets
    document.querySelectorAll('.anim-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.anim-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.anim.effect = btn.dataset.anim;
            scheduleRender();
        });
    });

    // Scale presets
    document.querySelectorAll('.res-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.res-preset').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.exportScale = Number(btn.dataset.scale);
        });
    });

    // Format sliders
    function bindSlider(id, setter, valId, fmt) {
        var el = document.getElementById(id);
        el.addEventListener('input', function() {
            var v = parseFloat(el.value);
            setter(v);
            if (valId) {
                var display = fmt ? fmt(v) : (Number.isInteger(v) ? v : v.toFixed(2));
                document.getElementById(valId).textContent = display;
            }
            scheduleRender();
        });
    }

    bindSlider('cols', function(v) { S.cols = v; }, 'colsVal');
    bindSlider('fontSize', function(v) {
        S.fontSize = v;
        S.leading = Math.round(v * 1.2);
    }, 'fontSizeVal');
    bindSlider('margin', function(v) { S.margin = v; }, 'marginVal');

    // Layer colors
    document.getElementById('bgColor').addEventListener('input', function(e) { S.bgColor = e.target.value; scheduleRender(); });
    document.getElementById('fgColor').addEventListener('input', function(e) { S.fgColor = e.target.value; scheduleRender(); });
    document.getElementById('blendMode').addEventListener('change', function(e) { S.blendMode = e.target.value; scheduleRender(); });

    // Style selects
    document.getElementById('fillChar').addEventListener('change', function(e) { S.fillChar = e.target.value; scheduleRender(); });
    document.getElementById('wallStyle').addEventListener('change', function(e) { S.wallStyle = e.target.value; scheduleRender(); });

    // Image import
    document.getElementById('imageInput').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
                loadedImage = img;
                document.getElementById('imageStatus').textContent = img.naturalWidth + 'x' + img.naturalHeight;
                document.getElementById('imageControls').classList.remove('hidden');
                document.getElementById('imageRemove').disabled = false;
                document.getElementById('imageSection').open = true;
                scheduleRender();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('imageRemove').addEventListener('click', function() {
        loadedImage = null;
        document.getElementById('imageInput').value = '';
        document.getElementById('imageStatus').textContent = 'No image';
        document.getElementById('imageControls').classList.add('hidden');
        document.getElementById('imageRemove').disabled = true;
        scheduleRender();
    });

    // Image position presets
    document.querySelectorAll('.img-pos-preset[data-pos]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.img-pos-preset[data-pos]').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.image.position = btn.dataset.pos;
            scheduleRender();
        });
    });

    // Image align presets
    document.querySelectorAll('.img-pos-preset[data-align]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.img-pos-preset[data-align]').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.image.align = btn.dataset.align;
            scheduleRender();
        });
    });

    // Image crop sliders
    bindSlider('imgCropTop', function(v) { S.image.cropTop = v; ditherCache = null; }, 'imgCropTopVal');
    bindSlider('imgCropBottom', function(v) { S.image.cropBottom = v; ditherCache = null; }, 'imgCropBottomVal');
    bindSlider('imgCropLeft', function(v) { S.image.cropLeft = v; ditherCache = null; }, 'imgCropLeftVal');
    bindSlider('imgCropRight', function(v) { S.image.cropRight = v; ditherCache = null; }, 'imgCropRightVal');
    bindSlider('imgOffsetX', function(v) { S.image.offsetX = v; }, 'imgOffsetXVal');
    bindSlider('imgOffsetY', function(v) { S.image.offsetY = v; }, 'imgOffsetYVal');
    bindSlider('imgOpacity', function(v) { S.image.opacity = v; }, 'imgOpacityVal');
    bindSlider('imgBrightness', function(v) { S.image.brightness = v; ditherCache = null; }, 'imgBrightnessVal');
    bindSlider('imgContrast', function(v) { S.image.contrast = v; ditherCache = null; }, 'imgContrastVal');
    bindSlider('imgGamma', function(v) { S.image.gamma = v; ditherCache = null; }, 'imgGammaVal');
    bindSlider('imgBlur', function(v) { S.image.blur = v; ditherCache = null; }, 'imgBlurVal');

    // Image filter presets
    document.querySelectorAll('.img-pos-preset[data-filter]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.img-pos-preset[data-filter]').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            S.image.filter = btn.dataset.filter;
            ditherCache = null; // invalidate cache
            scheduleRender();
        });
    });

    // Dither resolution
    bindSlider('imgDitherRes', function(v) { S.image.ditherRes = v; ditherCache = null; }, 'imgDitherResVal');

    // Content fields
    var contentFields = {
        cGallery: 'gallery', cArtist: 'artist', cTitle: 'title',
        cVernL: 'vernL', cVernD: 'vernD',
        cVystL: 'vystL', cVystF: 'vystF', cVystT: 'vystT',
        cSocial: 'social', cAddr: 'addr', cHours: 'hours',
    };
    for (var id in contentFields) {
        (function(fieldId, key) {
            var el = document.getElementById(fieldId);
            if (el) el.addEventListener('input', function() { S.content[key] = el.value; scheduleRender(); });
        })(id, contentFields[id]);
    }
    // Tagline textarea
    document.getElementById('cTagline').addEventListener('input', function(e) {
        S.content.tagline = e.target.value;
        scheduleRender();
    });
    // Bold toggles
    document.getElementById('boldVernisaz').addEventListener('change', function(e) {
        S.content.boldVernisaz = e.target.checked; scheduleRender();
    });
    document.getElementById('boldVystava').addEventListener('change', function(e) {
        S.content.boldVystava = e.target.checked; scheduleRender();
    });

    // Optional field toggles
    var toggleFields = {
        showTagline: { key: 'showTagline', container: 'taglineFields' },
        showVernisaz: { key: 'showVernisaz', container: 'vernisazFields' },
        showVystava: { key: 'showVystava', container: 'vystavaFields' },
        showSocial: { key: 'showSocial', container: 'socialFields' },
        showAddr: { key: 'showAddr', container: 'addrFields' },
        showHours: { key: 'showHours', container: 'hoursFields' },
    };
    for (var tid in toggleFields) {
        (function(toggleId, cfg) {
            var el = document.getElementById(toggleId);
            if (el) el.addEventListener('change', function(e) {
                S.content[cfg.key] = e.target.checked;
                var container = document.getElementById(cfg.container);
                if (container) container.style.display = e.target.checked ? '' : 'none';
                scheduleRender();
            });
        })(tid, toggleFields[tid]);
    }

    // Animation controls
    document.getElementById('btnPlay').addEventListener('click', togglePlay);
    document.getElementById('btnStop').addEventListener('click', stopAnimation);
    document.getElementById('btnPrevFrame').addEventListener('click', function() {
        pauseAnimation();
        S.anim.frame = Math.max(0, S.anim.frame - 1);
        document.getElementById('frameScrub').value = S.anim.frame;
        render(S.anim.frame);
    });
    document.getElementById('btnNextFrame').addEventListener('click', function() {
        pauseAnimation();
        S.anim.frame = Math.min(totalFrames() - 1, S.anim.frame + 1);
        document.getElementById('frameScrub').value = S.anim.frame;
        render(S.anim.frame);
    });

    // Frame scrubber
    document.getElementById('frameScrub').addEventListener('input', function(e) {
        pauseAnimation();
        S.anim.frame = parseInt(e.target.value);
        render(S.anim.frame);
    });

    // Duration
    bindSlider('duration', function(v) {
        S.anim.duration = v;
        updateFrameScrub();
    }, 'durationVal', function(v) { return v.toFixed(1); });

    // FPS
    bindSlider('fps', function(v) {
        S.anim.fps = v;
        updateFrameScrub();
    }, 'fpsVal');

    // Intensity
    bindSlider('intensity', function(v) { S.anim.intensity = v; }, 'intensityVal');

    // Loop
    document.getElementById('animLoop').addEventListener('change', function(e) { S.anim.loop = e.target.checked; });

    // Export
    document.getElementById('exportPng').addEventListener('click', exportPNG);
    document.getElementById('exportTxt').addEventListener('click', copyText);
    document.getElementById('exportWebm').addEventListener('click', exportWebM);
    document.getElementById('exportMp4').addEventListener('click', exportMP4);
    document.getElementById('exportMov').addEventListener('click', exportMOV);
    document.getElementById('exportPngSeq').addEventListener('click', function() { exportSequence('png'); });
    document.getElementById('exportJpgSeq').addEventListener('click', function() { exportSequence('jpg'); });

    // Resize
    window.addEventListener('resize', scheduleRender);

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowLeft') { e.preventDefault(); pauseAnimation(); S.anim.frame = Math.max(0, S.anim.frame - 1); document.getElementById('frameScrub').value = S.anim.frame; render(S.anim.frame); }
        if (e.code === 'ArrowRight') { e.preventDefault(); pauseAnimation(); S.anim.frame = Math.min(totalFrames() - 1, S.anim.frame + 1); document.getElementById('frameScrub').value = S.anim.frame; render(S.anim.frame); }
        if (e.code === 'Home') { e.preventDefault(); stopAnimation(); }
    });
}

// === RESET & SHUFFLE ==================================================

    S.cols = 80;
    S.aspectRatio = [3, 4];
    S.fontSize = 20;
    S.leading = 24;
    S.preset = 'floor-plan';
    S.bgColor = '#000000';
    S.fgColor = '#ffffff';
    S.blendMode = 'difference';
    S.fillChar = '\u2592';
    S.wallStyle = 'single';
    S.headingScale = 1;
    S.headingFont = 'display-semibold';
    S.headingBg = false;
    S.imageOnTop = false;
    S.margin = 10;
    S.exportScale = 2;
    S.anim.effect = 'none';
    S.anim.playing = false;
    S.anim.frame = 0;
    S.anim.duration = 4.0;
    S.anim.fps = 30;
    S.anim.loop = true;
    S.anim.intensity = 0.5;
    // Reset content to defaults
    S.content.gallery = 'PRO_STORY';
    S.content.artist = 'JM\u00c9NO P\u0158\u00cdJMEN\u00cd';
    S.content.title = 'N\u00c1ZEV V\u00ddSTAVY';
    S.content.tagline = 'Spolupr\u00e1ce obor\u016f SUP\u0160 UH,\nMultim\u00e9dia, Obuv, Design';
    S.content.showTagline = true;
    S.content.vernL = 'VERNIS\u00c1\u017d';
    S.content.vernD = '10_05_2026 | 16_00';
    S.content.showVernisaz = true;
    S.content.boldVernisaz = false;
    S.content.vystL = 'V\u00ddSTAVA';
    S.content.vystF = 'OD 10_05_2026';
    S.content.vystT = 'DO 10_07_2026';
    S.content.showVystava = true;
    S.content.boldVystava = false;
    S.content.social = '@PRO_STORY_UH | PROSTORY.GALLERY';
    S.content.showSocial = true;
    S.content.addr = 'V\u0161ehrdova 267, Uhersk\u00e9 Hradi\u0161t\u011b';
    S.content.showAddr = true;
    S.content.hours = 'Otev\u0159eno ka\u017edou st\u0159edu od 12\u201317';
    S.content.showHours = true;
    // Sync content inputs
    document.getElementById('cGallery').value = S.content.gallery;
    document.getElementById('cArtist').value = S.content.artist;
    document.getElementById('cTitle').value = S.content.title;
    document.getElementById('cTagline').value = S.content.tagline;
    document.getElementById('showTagline').checked = S.content.showTagline;
    document.getElementById('cVernL').value = S.content.vernL;
    document.getElementById('cVernD').value = S.content.vernD;
    document.getElementById('showVernisaz').checked = S.content.showVernisaz;
    document.getElementById('boldVernisaz').checked = S.content.boldVernisaz;
    document.getElementById('cVystL').value = S.content.vystL;
    document.getElementById('cVystF').value = S.content.vystF;
    document.getElementById('cVystT').value = S.content.vystT;
    document.getElementById('showVystava').checked = S.content.showVystava;
    document.getElementById('boldVystava').checked = S.content.boldVystava;
    document.getElementById('cSocial').value = S.content.social;
    document.getElementById('showSocial').checked = S.content.showSocial;
    document.getElementById('cAddr').value = S.content.addr;
    document.getElementById('showAddr').checked = S.content.showAddr;
    document.getElementById('cHours').value = S.content.hours;
    document.getElementById('showHours').checked = S.content.showHours;
    stopAnimation();
    syncUI();
    updateFrameScrub();
    render();
}

function shufflePreset() {
    var presetKeys = Object.keys(PRESETS);
    var animKeys = Object.keys(ANIMS);
    S.preset = presetKeys[Math.floor(Math.random() * presetKeys.length)];
    S.anim.effect = animKeys[Math.floor(Math.random() * animKeys.length)];
    S.anim.frame = 0;
    syncUI();
    updateFrameScrub();
    render();
    // Auto-play
    if (S.anim.effect !== 'none') {
        S.anim.playing = true;
        animStartTime = performance.now();
        document.getElementById('btnPlay').textContent = '\u23F8';
        animFrameId = requestAnimationFrame(animationLoop);
    }
}

function syncUI() {
    // Sync all UI controls to current S state
    document.getElementById('cols').value = S.cols;
    document.getElementById('colsVal').textContent = S.cols;
    document.getElementById('fontSize').value = S.fontSize;
    document.getElementById('fontSizeVal').textContent = S.fontSize;
    document.getElementById('margin').value = S.margin;
    document.getElementById('marginVal').textContent = S.margin;
    document.getElementById('bgColor').value = S.bgColor;
    document.getElementById('fgColor').value = S.fgColor;
    document.getElementById('blendMode').value = S.blendMode;
    document.getElementById('fillChar').value = S.fillChar;
    document.getElementById('wallStyle').value = S.wallStyle;
    document.getElementById('headingFont').value = S.headingFont;
    document.getElementById('headingBg').checked = S.headingBg;
    document.getElementById('imageOnTop').checked = S.imageOnTop;
    document.getElementById('intensity').value = S.anim.intensity;
    document.getElementById('intensityVal').textContent = S.anim.intensity.toFixed(2);
    document.getElementById('duration').value = S.anim.duration;
    document.getElementById('durationVal').textContent = S.anim.duration.toFixed(1);
    document.getElementById('fps').value = S.anim.fps;
    document.getElementById('fpsVal').textContent = S.anim.fps;
    document.getElementById('animLoop').checked = S.anim.loop;
    // Leading
    var leadingEl = document.getElementById('leading');
    if (leadingEl) { leadingEl.value = S.leading; }
    var leadingVal = document.getElementById('leadingVal');
    if (leadingVal) { leadingVal.textContent = S.leading; }
    // Aspect ratio buttons
    document.querySelectorAll('.aspect-preset').forEach(function(b) {
        b.classList.toggle('active', b.dataset.ratio === S.aspectRatio[0] + ':' + S.aspectRatio[1]);
    });
    // Preset buttons
    document.querySelectorAll('.preset-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.preset === S.preset);
    });
    // Heading scale buttons
    document.querySelectorAll('.heading-preset').forEach(function(b) {
        b.classList.toggle('active', Number(b.dataset.scale) === S.headingScale);
    });
    // Animation buttons
    document.querySelectorAll('.anim-preset').forEach(function(b) {
        b.classList.toggle('active', b.dataset.anim === S.anim.effect);
    });
    // Scale presets
    document.querySelectorAll('.res-preset').forEach(function(b) {
        b.classList.toggle('active', Number(b.dataset.scale) === S.exportScale);
    });
}

// === INIT =============================================================

bindControls();
document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnShuffle').addEventListener('click', shufflePreset);
updateFrameScrub();
render();

</script>
